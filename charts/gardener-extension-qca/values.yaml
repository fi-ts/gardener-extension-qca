config:
  clientConnection:
    acceptContentTypes: application/json
    contentType: application/json
    qps: 100
    burst: 130
  tenantConfigs:
    - tenantId: "ft"
      ActivationId: 00000000-0000-0000-0000-000000000123
      customerId: 00000000-0000-0000-0000-000000000456
      serverUri: myserver
      proxy: myproxy
gardener:
  version: ""
